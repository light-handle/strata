<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="peak" x1="60" y1="10" x2="60" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffcc44"/>
      <stop offset="40%" stop-color="#ffb832"/>
      <stop offset="70%" stop-color="#cc8800"/>
      <stop offset="100%" stop-color="#1a4040"/>
    </linearGradient>
    <linearGradient id="base" x1="60" y1="70" x2="60" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d2828"/>
      <stop offset="100%" stop-color="#08080c"/>
    </linearGradient>
  </defs>
  <!-- Base shadow -->
  <ellipse cx="60" cy="100" rx="45" ry="10" fill="#0d2828" opacity="0.5"/>
  <!-- Mountain layers (strata) -->
  <polygon points="60,15 105,90 15,90" fill="url(#peak)" opacity="0.9"/>
  <polygon points="60,35 95,90 25,90" fill="url(#peak)" opacity="0.7"/>
  <polygon points="60,50 85,90 35,90" fill="url(#peak)" opacity="0.5"/>
  <!-- Contour lines -->
  <line x1="28" y1="75" x2="92" y2="75" stroke="#00cc88" stroke-width="0.8" opacity="0.6"/>
  <line x1="36" y1="62" x2="84" y2="62" stroke="#88aa22" stroke-width="0.8" opacity="0.5"/>
  <line x1="44" y1="49" x2="76" y2="49" stroke="#ccaa00" stroke-width="0.8" opacity="0.4"/>
  <line x1="50" y1="38" x2="70" y2="38" stroke="#ffcc44" stroke-width="0.8" opacity="0.3"/>
  <!-- Peak marker -->
  <circle cx="60" cy="15" r="2.5" fill="#ffcc44"/>
  <circle cx="60" cy="15" r="4" fill="#ffcc44" opacity="0.2"/>
  <!-- Grid dots at base -->
  <circle cx="25" cy="90" r="1" fill="#1a4040"/>
  <circle cx="40" cy="90" r="1" fill="#1a4040"/>
  <circle cx="55" cy="90" r="1" fill="#1a4040"/>
  <circle cx="70" cy="90" r="1" fill="#1a4040"/>
  <circle cx="85" cy="90" r="1" fill="#1a4040"/>
  <circle cx="95" cy="90" r="1" fill="#1a4040"/>
</svg>
